<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Phishing Shield Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            width: 100%;
            max-width: 800px;
            padding: 40px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            margin-bottom: 30px;
        }
        h1 {
            text-align: center;
            color: #1d4ed8;
            margin-top: 0;
            font-size: 2.2rem;
            font-weight: 800;
        }
        p.subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 30px;
            font-weight: 500;
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        input[type="text"] {
            flex: 1;
            background-color: #f1f5f9;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            padding: 15px;
            color: #0f172a;
            font-size: 1rem;
        }
        button {
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0 25px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover { background-color: #1d4ed8; }
        .verdict-box {
            text-align: center;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: bold;
            font-size: 1.3rem;
        }
        .phishing { background-color: #fef2f2; border: 1px solid #f87171; color: #dc2626; }
        .legitimate { background-color: #f0fdf4; border: 1px solid #4ade80; color: #16a34a; }

        .probability-container {
            margin-bottom: 25px;
            padding: 20px;
            background-color: #f8fafc;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }
        .probability-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: #475569;
            margin-bottom: 12px;
            text-align: center;
        }
        .bar-row {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            gap: 10px;
        }
        .bar-label {
            width: 120px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #334155;
        }
        .bar-track {
            flex: 1;
            background-color: #e2e8f0;
            border-radius: 999px;
            height: 18px;
            overflow: hidden;
        }
        .bar-fill {
            height: 100%;
            border-radius: 999px;
            transition: width 0.8s ease;
        }
        .bar-fill.phish { background-color: #ef4444; }
        .bar-fill.legit { background-color: #22c55e; }
        .bar-percent {
            width: 50px;
            font-size: 0.9rem;
            font-weight: 700;
            text-align: right;
        }
        .phish-percent { color: #dc2626; }
        .legit-percent { color: #16a34a; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
        }
        .card {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 15px;
        }
        .card-title {
            font-size: 0.85rem;
            color: #64748b;
            margin-bottom: 5px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .safe { color: #16a34a; font-weight: bold; }
        .danger { color: #dc2626; font-weight: bold; }

        .history-container {
            background-color: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            width: 100%;
            max-width: 800px;
            padding: 30px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
        }
        .history-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #1e293b;
            margin-top: 0;
            margin-bottom: 20px;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 10px;
        }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 12px 15px; border-bottom: 1px solid #f1f5f9; font-size: 0.95rem; }
        th { background-color: #f8fafc; color: #475569; font-weight: 600; }
        .badge { padding: 4px 8px; border-radius: 12px; font-size: 0.8rem; font-weight: bold; }
        .badge-phish { background-color: #fee2e2; color: #ef4444; }
        .badge-legit { background-color: #dcfce7; color: #22c55e; }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI Phishing Shield</h1>
        <p class="subtitle">Predictive Cyber Threat Analysis Engine</p>

        <div class="input-group">
            <input type="text" id="urlInput" placeholder="Paste target URL here...">
            <button onclick="runAnalysis()">Scan Link</button>
        </div>

        <div id="resultArea" style="display: none;">
            <div id="verdictBadge" class="verdict-box"></div>

            <div class="probability-container">
                <div class="probability-title">AI Confidence Score</div>
                <div class="bar-row">
                    <div class="bar-label">Phishing Risk</div>
                    <div class="bar-track">
                        <div class="bar-fill phish" id="phishBar" style="width: 0%"></div>
                    </div>
                    <div class="bar-percent phish-percent" id="phishPercent">0%</div>
                </div>
                <div class="bar-row">
                    <div class="bar-label">Legitimate</div>
                    <div class="bar-track">
                        <div class="bar-fill legit" id="legitBar" style="width: 0%"></div>
                    </div>
                    <div class="bar-percent legit-percent" id="legitPercent">0%</div>
                </div>
            </div>

            <h3 style="color: #475569; font-size: 1rem; font-weight: 700;">Vector Inspection Breakdown:</h3>
            <div id="vectorGrid" class="grid"></div>
        </div>
    </div>

    <div class="history-container">
        <h2 class="history-title">Recent Global Scan Logs</h2>
        <table>
            <thead>
                <tr>
                    <th>Target URL</th>
                    <th>AI Security Verdict</th>
                    <th>Timestamp</th>
                </tr>
            </thead>
            <tbody id="historyTableBody">
                <tr>
                    <td colspan="3" style="text-align: center; color: #94a3b8;">Loading history...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", fetchHistoryTable);

        function fetchHistoryTable() {
            fetch('/history')
            .then(res => res.json())
            .then(data => {
                const tbody = document.getElementById('historyTableBody');
                tbody.innerHTML = '';
                if(data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3" style="text-align: center; color: #94a3b8;">No scan records found.</td></tr>';
                    return;
                }
                data.forEach(item => {
                    const row = document.createElement('tr');
                    const badgeClass = item.verdict.includes("Phishing") ? "badge badge-phish" : "badge badge-legit";
                    row.innerHTML = `
                        <td style="word-break: break-all; max-width: 350px; color: #334155;">${item.url}</td>
                        <td><span class="${badgeClass}">${item.verdict}</span></td>
                        <td style="color: #64748b; font-size: 0.85rem;">${item.timestamp}</td>
                    `;
                    tbody.appendChild(row);
                });
            })
            .catch(err => console.error("History error:", err));
        }

        function runAnalysis() {
            const url = document.getElementById('urlInput').value.trim();
            if(!url) {
                alert("Please input a URL to analyze.");
                return;
            }

            fetch('/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: url })
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById('resultArea').style.display = 'block';
                const badge = document.getElementById('verdictBadge');

                if(data.status === -1) {
                    badge.className = "verdict-box phishing";
                    badge.innerText = "DANGER: PHISHING ATTACK DETECTED";
                } else {
                    badge.className = "verdict-box legitimate";
                    badge.innerText = "SECURE: LEGITIMATE DOMAIN VERIFIED";
                }

                // UPDATE PROBABILITY BARS
                const phishPct = Math.round(data.phish_probability * 100);
                const legitPct = Math.round(data.legit_probability * 100);

                document.getElementById('phishBar').style.width = phishPct + '%';
                document.getElementById('legitBar').style.width = legitPct + '%';
                document.getElementById('phishPercent').innerText = phishPct + '%';
                document.getElementById('legitPercent').innerText = legitPct + '%';

                const grid = document.getElementById('vectorGrid');
                grid.innerHTML = '';

                const featuresToDisplay = ['HTTPS', 'LongURL', 'ShortURL', 'PrefixSuffix-', 'SubDomain', 'Symbol@', 'Redirecting//', 'HTTPS_token', 'UsingIP'];

                featuresToDisplay.forEach(f => {
                    if(data.features_matrix && data.features_matrix[f] !== undefined) {
                        const val = data.features_matrix[f];
                        let statusHTML = '';
                        if(val === 1) {
                            statusHTML = '<span class="safe">Secure</span>';
                        } else {
                            if (f === 'HTTPS') statusHTML = '<span class="danger">No HTTPS Encryption</span>';
                            else if (f === 'LongURL') statusHTML = '<span class="danger">Dangerously Long Link</span>';
                            else if (f === 'PrefixSuffix-') statusHTML = '<span class="danger">Fake Brand Hyphens</span>';
                            else statusHTML = '<span class="danger">Malicious Pattern</span>';
                        }
                        const card = document.createElement('div');
                        card.className = 'card';
                        card.innerHTML = `<div class="card-title">${f} Metric</div><div>${statusHTML}</div>`;
                        grid.appendChild(card);
                    }
                });

                fetchHistoryTable();
            })
            .catch(err => alert("Handshake error with AI background server."));
        }
    </script>
</body>
</html>
